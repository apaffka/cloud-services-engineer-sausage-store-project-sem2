---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: {{ .Chart.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicas }}
  strategy:
{{ toYaml .Values.strategy | indent 4 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/path: {{ .Values.annotations.path | quote }}
        prometheus.io/port: {{ .Values.annotations.port | quote }}
        prometheus.io/scrape: {{ .Values.annotations.scrape | quote }}
      labels:
        app: {{ .Release.Name }}-{{ .Chart.Name }}
    spec:
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done
              echo "PostgreSQL is available"
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"

        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 5
              done
              echo "MongoDB is available"
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: REPORT_PATH
              value: {{ .Values.env.reportPath | quote }}
            - name: LOG_PATH
              value: {{ .Values.env.logPath | quote }}
            - name: SPRING_CLOUD_VAULT_ENABLED
              value: "true"
            - name: SPRING_CONFIG_IMPORT
              value: "vault://"
            - name: SPRING_CLOUD_VAULT_URI
              value: {{ .Values.vault.uri | quote }}
            - name: SPRING_CLOUD_VAULT_AUTHENTICATION
              value: "APPROLE"
            - name: SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approleSecretName }}
                  key: role-id
            - name: SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approleSecretName }}
                  key: secret-id
            - name: SPRING_CLOUD_VAULT_KV_ENABLED
              value: "true"
            - name: SPRING_CLOUD_VAULT_KV_BACKEND
              value: "secret"
            - name: SPRING_CLOUD_VAULT_KV_APPLICATION_NAME
              value: "sausage-store"
            - name: SPRING_CLOUD_VAULT_FAIL_FAST
              value: "true"
            - name: SPRING_APPLICATION_NAME
              value: "sausage-store"
            - name: SPRING_CLOUD_VAULT_KV_DEFAULT_CONTEXT
              value: "sausage-store"


          resources:
{{ toYaml .Values.resources | indent 12 }}
          ports:
            - name: {{ .Chart.Name }}
              containerPort: {{ .Values.containerPort }}
          livenessProbe:
{{ toYaml .Values.livenessProbe | indent 12 }}

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-vpa
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: {{ .Release.Name }}-{{ .Chart.Name }}
  updatePolicy:
{{ toYaml .Values.vpa.updatePolicy | indent 4 }}
  resourcePolicy:
{{ toYaml .Values.vpa.resourcePolicy | indent 4 }}
