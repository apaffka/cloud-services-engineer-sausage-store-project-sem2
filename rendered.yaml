              cpu: 100m
              memory: 128Mi 
          ports:
            - name: frontend
              containerPort: 80
          volumeMounts:
          - name: sausage-store-frontend-conf
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
            readOnly: true
      volumes:
        - name: sausage-store-frontend-conf
          configMap:
            name: sausage-store-frontend-conf
            items:
              - key: nginx.conf
                path: nginx.conf 
