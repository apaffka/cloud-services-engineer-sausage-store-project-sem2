# Source: sausage-store/charts/frontend/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sausage-store-frontend
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
        - "front-agapov.2sem.students-projects.ru"
      secretName: "2sem-students-projects-wildcard-secret"
  rules:
    - host: "front-agapov.2sem.students-projects.ru"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sausage-store-backend-service
                port:
                  number: 8080

          - path: /
            pathType: Prefix
            backend:
              service:
                name: sausage-store-frontend
                port:
                  number: 80
