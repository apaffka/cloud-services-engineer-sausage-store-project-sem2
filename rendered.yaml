# Source: sausage-store/charts/backend-report/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sausage-store-backend-report
  namespace: r-devops-magistracy-project-2sem-97971079
  labels:
    app.kubernetes.io/name: backend-report
    app.kubernetes.io/instance: "sausage-store"
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: "Helm"
    helm.sh/chart: "backend-report-0.1.0"
    app.kubernetes.io/component: backend-report
    app.kubernetes.io/part-of: sausage-store
spec:
  revisionHistoryLimit: 12
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sausage-store-backend-report
  template:
    metadata:
      labels:
        app: sausage-store-backend-report
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 5
              done
              echo "MongoDB is available"
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: backend-report
          image: apaffka/sausage-backend-report:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-report-conf
                  key: PORT
            - name: DB
              valueFrom:
                secretKeyRef:
                  name: sausage-store-backend-report-secret
                  key: DB
          resources:
            limits:
              cpu: 150m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi

---
# Source: sausage-store/charts/backend/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sausage-store-backend
  namespace: r-devops-magistracy-project-2sem-97971079
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: "sausage-store"
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: "Helm"
    helm.sh/chart: "backend-0.1.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sausage-store
spec:
  revisionHistoryLimit: 15
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: sausage-store-backend
  template:
    metadata:
      annotations:
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
      labels:
        app: sausage-store-backend
    spec:
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done
              echo "PostgreSQL is available"
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"

        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 5
              done
              echo "MongoDB is available"
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: backend
          image: apaffka/sausage-backend:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: postgres_uri

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: postgres_user

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sausage-store-backend-secret
                  key: postgres_password

            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: mongo_uri

            - name: SPRING_CLOUD_VAULT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: vault_enabled

            - name: REPORT_PATH
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: report_path

            - name: LOG_PATH
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: log_path

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          ports:
            - name: backend
              containerPort: 8080
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
---
