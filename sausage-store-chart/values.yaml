global:
  imagePullPolicy: Always
  ###vault:
  ###  host: ip
  ###  name: vault
  ###  vaultToken: someToken


frontend:
  image: apaffka/sausage-frontend:latest
  replicas: 1
  revisionHistoryLimit: 12
  containerPort: 80
  service:
    port: 80
    targetPort: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  ingress:
    enabled: true
    host: front-agapov.2sem.students-projects.ru
    className: nginx
    tlsSecretName: 2sem-students-projects-wildcard-secret

backend:
  annotations:
    path: /actuator/prometheus
    port: "8080"
    scrape: "true"
  env:
    postgresUri: "jdbc:postgresql://postgresql:5432/sausage-store"
    postgresUser: "store"
    postgresPassword: "storepassword"
    mongoUri: "mongodb://root:rootpassword@mongodb:27017/sausage-store?authSource=admin"
    reportPath: "/logs/reports"
    logPath: "/logs"
    vaultEnabled: "false"
  service:
    port: 8080
  revisionHistoryLimit: 15
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image: apaffka/sausage-backend:latest
  imagePullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  containerPort: 8080
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  vpa:
    updatePolicy:
      updateMode: "Off"
    resourcePolicy:
      containerPolicies:
        - containerName: backend
          minAllowed:
            cpu: 25m
            memory: 128Mi
          maxAllowed:
            cpu: 1
            memory: 512Mi
  vault:
    enabled: true
    uri: "https://www.agapovlab.ru"
    approleSecretName: sausage-store-vault-approle

backend-report:
  image: apaffka/sausage-backend-report:latest
  replicas: 1
  revisionHistoryLimit: 12
  containerPort: 8080
  env:
    port: "8080"
    db: "mongodb://root:rootpassword@mongodb:27017/sausage-store?authSource=admin"
  strategy:
    type: Recreate
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "150m"

  hpa:
    minReplicas: 1
    maxReplicas: 3
    averageUtilization: 75

infra:
  postgresql:
    image: postgres:13-alpine
    containerPort: 5432
    database: sausage-store
    username: store
    password: storepassword
    storage: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "300m"
  cpu: "500m"
  mongodb:
    image: mongo:7.0
    containerPort: 27017
    storage: 1Gi
    env:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "300m"