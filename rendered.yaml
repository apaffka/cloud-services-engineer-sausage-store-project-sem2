# Source: sausage-store/charts/backend/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sausage-store-backend
  namespace: r-devops-magistracy-project-2sem-97971079
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: "sausage-store"
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: "Helm"
    helm.sh/chart: "backend-0.1.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sausage-store
spec:
  revisionHistoryLimit: 15
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: sausage-store-backend
  template:
    metadata:
      annotations:
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
      labels:
        app: sausage-store-backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB/sausage-backend:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: postgres_uri

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: postgres_user

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sausage-store-backend-secret
                  key: postgres_password

            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: mongo_uri

            - name: SPRING_CLOUD_VAULT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: vault_enabled

            - name: REPORT_PATH
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: report_path

            - name: LOG_PATH
              valueFrom:
                configMapKeyRef:
                  name: sausage-store-backend-conf
                  key: log_path

          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          ports:
            - name: backend
              containerPort: 8080
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
