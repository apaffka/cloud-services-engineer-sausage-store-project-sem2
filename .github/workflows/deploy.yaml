name: Sausage Store Deploy by Agapov

on:
  push:
    branches:
      - main

env:
  VERSION: 1.0.${{ github.run_number }}
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.SAUSAGE_STORE_NAMESPACE }}
  KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}

jobs:
  # Сборка и пуш образов в DockerHub
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          # Получение исходного кода из репозитория
          uses: actions/checkout@v3

        - name: Set up Dockercat sausage-store-chart/Chart.yaml Buildx
          # Установка сборщика контейнеров Docker
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker 
          # Авторизация на Docker Hub:
          uses: docker/login-action@v2
          # При помощи with передаём в action параметры username и password
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Push Backend to DockerHub
          # Одновременный билд и пуш образа в Docker Hub:
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            platforms: linux/amd64
            push: true
            tags: |
              ${{ secrets.DOCKER_USER }}/sausage-backend:latest
              ${{ secrets.DOCKER_USER }}/sausage-backend:${{ env.VERSION }}
            build-args: |
              VERSION=${{ env.VERSION }}

        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            platforms: linux/amd64
            push: true
            tags: |
              ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
              ${{ secrets.DOCKER_USER }}/sausage-frontend:${{ env.VERSION }}

        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            platforms: linux/amd64
            push: true
            tags: |
              ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest
              ${{ secrets.DOCKER_USER }}/sausage-backend-report:${{ env.VERSION }}

  upload_helm_chart_to_nexus:
    name: Package and upload Helm chart to Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint ./sausage-store-chart

      - name: Package Helm chart
        run: |
          mkdir -p helm-packages
          helm package ./sausage-store-chart \
            --version ${{ env.VERSION }} \
            --app-version ${{ env.VERSION }} \
            --destination helm-packages
          
          ls -la helm-packages

      - name: Upload Helm chart to Nexus
        run: |
          CHART_PACKAGE=$(ls helm-packages/*.tgz)
          CHART_FILE=$(basename "$CHART_PACKAGE")
          
          echo "Uploading $CHART_FILE to Nexus"
          
          curl -f -u "${{ secrets.NEXUS_HELM_REPO_USER }}:${{ secrets.NEXUS_HELM_REPO_PASSWORD }}" \
            --upload-file "$CHART_PACKAGE" \
            "${{ secrets.NEXUS_HELM_REPO }}/$CHART_FILE"


  deploy_to_kubernetes:
    name: Deploy Helm chart to Kubernetes
    runs-on: ubuntu-latest
    needs: upload_helm_chart_to_nexus

    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          kubectl config current-context
          kubectl config set-context --current --namespace="${{ env.SAUSAGE_STORE_NAMESPACE }}"

          kubectl get pods

      - name: Download Helm chart from Nexus
        run: |
          mkdir -p helm-packages
          
          CHART_NAME="sausage-store"
          CHART_FILE="${CHART_NAME}-${{ env.VERSION }}.tgz"
          
          curl -f -L -u "${{ secrets.NEXUS_HELM_REPO_USER }}:${{ secrets.NEXUS_HELM_REPO_PASSWORD }}" \
            "${{ secrets.NEXUS_HELM_REPO }}/${CHART_FILE}" \
            -o "helm-packages/${CHART_FILE}"
          
          ls -la helm-packages

      - name: Deploy to Kubernetes
        run: |
          CHART_PACKAGE=$(ls helm-packages/*.tgz)
          
          helm upgrade --install sausage-store "$CHART_PACKAGE" \
            --set backend.image=${{ secrets.DOCKER_USER }}/sausage-backend:${{ env.VERSION }} \
            --set backend-report.image=${{ secrets.DOCKER_USER }}/sausage-backend-report:${{ env.VERSION }} \
            --set frontend.image=${{ secrets.DOCKER_USER }}/sausage-frontend:${{ env.VERSION }}

      - name: Check deployment status
        run: |
          kubectl get pods
          kubectl get pvc
          kubectl get svc
          kubectl get ingress
          kubectl get hpa
          kubectl get vpa